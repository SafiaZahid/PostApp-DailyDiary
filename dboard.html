<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="dboard.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <nav class="navbar navbar-dark  " aria-label="First navbar example">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Post App</a>
            <button class="text-align-right btn btn-primary" onclick="logOut()">LogOut</button>
        </div>
    </nav>
    <div class="container-fluid">
        <div class="row">
            <div class="col-12 col-sm-12 col-md-6 col-lg-4">
                <div class="main p-4">
                    <div class="card p-3">
               
                    <div class="mb-3">
                        <label for="exampleInputEmail1" class="form-label label1">Dear Diary</label>
                        <input id="title" type="text" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
                        
                    </div>
                    <div class="mb-3">
                        <label for="exampleFormControlTextarea1" class="form-label label2">Today's Chapter</label>
                        <textarea id="description" class="form-control" id="exampleFormControlTextarea1" rows="3" placeholder="It all started when..."></textarea>
                      </div>
                      <div class="mb-3">
                        <div class="images-list d-flex">
                            <img src="/images/img1.gif" alt="" onclick="selectedImg('./images/img1.gif')" class="bg-image">
                            <img src="/images/img2.gif" alt="" onclick="selectedImg('./images/img2.gif')" class="bg-image">
                            <img src="/images/img3.gif" alt="" onclick="selectedImg('./images/img3.gif')" class="bg-image">
                            <img src="/images/img4.gif" alt="" onclick="selectedImg('./images/img4.gif')" class="bg-image">
                            <img src="/images/img5.gif" alt="" onclick="selectedImg('./images/img5.gif')" class="bg-image">

                        </div>
                      </div>
                    
                    <button type="submit" class="btn btn-primary" onclick="addPost()">Publish My Day</button>
               
            </div>
            </div>
            </div>
            <div class="col-12 col-sm-12 col-md-8 col-lg-8">
                <div class="main p-4" id="post-container">
                
            </div>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment-with-locales.min.js" integrity="sha512-4F1cxYdMiAW98oomSLaygEwmCnIP38pb4Kx70yQYqRwLVCs3DbRumfBq82T08g/4LJ/smbFGFpmeFlQgoDccgg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="dboard.js"></script>
</body>

</html>
