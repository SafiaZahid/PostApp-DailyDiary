<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="dboard.css">
</head>

<body>
    <nav class="navbar navbar-dark  " aria-label="First navbar example">
        <div class="container-fluid">
            <a class="navbar-brand" id="greet" href="#">Post App</a>
            <div class="d-flex justify-content-start align-items-center gap-2">
                <div class="input-group position-relative input-field">

                    <!-- <span class="input-group-text"> -->
                    <i class="fa-solid fa-magnifying-glass position-absolute" style="
                        color: #801f4f; 
                        left:12px;
                        top:50%; 
                        transform:translateY(-50%);
                        cursor:pointer;
                        z-index: 10;"></i>


                    <input type="search" id="searchInput" class="form-control ps-5" placeholder="Search posts..."
                        onkeyup="searchPost()">
                </div>
                <button class="btn btn-primary" onclick="logOut()">LogOut</button>
            </div>
        </div>
    </nav>
    <div class="container-fluid">
        <div class="row">
            <div class="col-12 col-sm-12 col-md-6 col-lg-4">
                <div class="main p-4">
                    <div class="card p-3">

                        <div class="mb-3">
                            <label for="exampleInputEmail1" class="form-label label1">Dear Diary</label>
                            <input id="title" type="text" class="form-control" id="exampleInputEmail1"
                                aria-describedby="emailHelp">

                        </div>
                        <div class="mb-3">
                            <label for="exampleFormControlTextarea1" class="form-label label2">Today's Chapter</label>
                            <div class="editor-toolbar d-flex gap-0 justify-content-between align-items-center mb-2">
                                <div class="btn-grp">
                                    <button class="btn btn-outline-secondary text-style-btn btn1" type="button"
                                        onclick="format('bold')">B</button>
                                    <button class="btn btn-outline-secondary text-style-btn btn2" type="button"
                                        onclick="format('italic')">I</button>
                                    <button class="btn btn-outline-secondary text-style-btn btn3" type="button"
                                        onclick="format('underline')">U</button>
                                </div>
                                <select id="fontSize" class="form-select w-auto"
                                    onchange="format('fontSize', this.value)">
                                    <option value="3">Normal</option>
                                    <option value="2">Small</option>
                                    <option value="5">Large</option>
                                    <option value="7">Extra Large</option>
                                </select>
                                <input type="color" id="colorPicker" class="form-control form-control-color"
                                    title="Choose your color" oninput="format('foreColor', this.value)">
                            </div>
                            <div id="description" class="form-control text-area"
                                data-placeholder="It all started when..." contenteditable="true"></div>
                        </div>
                        <div class="mb-3">
                            <div class="images-list d-flex">
                                <img src="./images/img1.gif" alt="" onclick="selectedImg('./images/img1.gif')"
                                    class="bg-image">
                                <img src="./images/img2.gif" alt="" onclick="selectedImg('./images/img2.gif')"
                                    class="bg-image">
                                <img src="./images/img3.gif" alt="" onclick="selectedImg('./images/img3.gif')"
                                    class="bg-image">
                                <img src="./images/img4.gif" alt="" onclick="selectedImg('./images/img4.gif')"
                                    class="bg-image">
                                <img src="./images/img5.gif" alt="" onclick="selectedImg('./images/img5.gif')"
                                    class="bg-image">

                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary" onclick="addPost()">Publish My Day</button>

                    </div>
                </div>
            </div>
            <div class="col-12 col-sm-12 col-md-8 col-lg-8">
                <div class="main p-4" id="post-container">

                </div>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment-with-locales.min.js"
        integrity="sha512-4F1cxYdMiAW98oomSLaygEwmCnIP38pb4Kx70yQYqRwLVCs3DbRumfBq82T08g/4LJ/smbFGFpmeFlQgoDccgg=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="dboard.js"></script>
</body>

</html>
